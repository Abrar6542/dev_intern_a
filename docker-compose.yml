version: '3.8'

services:
  backend:
    build: ./backend
    container_name: django_app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=devsecret
      - BACKEND_URL=http://localhost:8000
      - FRONTEND_URL=http://localhost:3000

  frontend:
    build: ./frontend
    container_name: nextjs_app
    ports:
      - "3000:3000"
    depends_on:
      - backend
